<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Respuestas de la Entrevista</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<h1>Respuestas de la Entrevista</h1>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Pregunta</th>
        <th>Respuesta</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="answer : ${answers}">
        <td th:text="${answer.id}">1</td>
        <td th:text="${answer.question.text}">Pregunta ejemplo</td>
        <td th:text="${answer.answer}">Respuesta ejemplo</td>
    </tr>
    </tbody>
</table>

</body>
</html>
